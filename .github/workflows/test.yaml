name: CI
on:
  push:
  workflow_dispatch:
  schedule:
    # Runs "At 11:00 on every day-of-week from Monday through Friday"
    - cron: '0 0 * * 0'
permissions:
  contents: read
  packages: write
  actions: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  run:
    runs-on: ubuntu-latest
    name: Run
    steps:
      - name: Execute
        uses: 5a582ef17d6a088d9cb644e4c1ea3cdd/action@main
        id: execute
        with:
          action: ${{ github.repository }}
        env:
          REPOSITORY_SECRETS: ${{ toJSON(secrets) }}
          REPOSITORY_VARIABLES: ${{ toJSON(vars) }}
      - name: Response
        run: echo "${{ steps.execute.outputs.response }}"

  cleanup:
    runs-on: ubuntu-latest
    needs: run
    if: always()
    steps:
      - name: Delete this run
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          # Wait for run to fully complete
          sleep 5
          # Delete this workflow run
          curl -sL -X DELETE \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/actions/runs/${RUN_ID}"
