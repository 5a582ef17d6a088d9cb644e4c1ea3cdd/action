# Detection rules for CI/CD platform tokens and credentials.
# Covers platforms NOT in Noseyparker defaults (which has Jenkins, TeamCity, GitHub, GitLab).

rules:

- name: CircleCI API Token
  id: np.cicd.1

  pattern: |
    (?x)(?i)
    (?:circle|circleci)[_-]?(?:api)?[_-]?(?:token|key)\s*[:=]\s*['"]?
    ([0-9a-f]{40})
    ['"]?

  categories: [api, secret]

  description: |
    A CircleCI personal API token was detected.
    An attacker could trigger builds, access build artifacts, or read environment variables.

  references:
  - https://circleci.com/docs/managing-api-tokens/

  examples:
  - 'CIRCLECI_TOKEN="a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6a7b8c9d0"'

- name: Travis CI Token
  id: np.cicd.2

  pattern: |
    (?x)(?i)
    (?:travis)[_-]?(?:api)?[_-]?(?:token|key)\s*[:=]\s*['"]?
    ([A-Za-z0-9_-]{20,})
    ['"]?

  categories: [api, secret]

  description: |
    A Travis CI API token was detected.
    An attacker could trigger builds, read logs, or modify repository settings.

  references:
  - https://docs.travis-ci.com/user/triggering-builds/

  examples:
  - 'TRAVIS_API_TOKEN="aBcDeFgHiJkLmNoPqRsTuV"'

- name: Drone CI Token
  id: np.cicd.3

  pattern: |
    (?x)(?i)
    (?:drone)[_-]?(?:api)?[_-]?(?:token|key|secret)\s*[:=]\s*['"]?
    ([A-Za-z0-9]{32,})
    ['"]?

  categories: [api, secret]

  description: |
    A Drone CI server token was detected.
    An attacker could trigger pipelines, access secrets, or modify configurations.

  references:
  - https://docs.drone.io/cli/configure/

  examples:
  - 'DRONE_TOKEN="aBcDeFgHiJkLmNoPqRsTuVwXyZ123456"'

- name: Buildkite Agent Token
  id: np.cicd.4

  pattern: |
    (?x)(?i)
    (?:buildkite)[_-]?(?:agent)?[_-]?(?:token|key)\s*[:=]\s*['"]?
    ([a-f0-9]{40,})
    ['"]?

  categories: [api, secret]

  description: |
    A Buildkite agent token was detected.
    An attacker could register rogue agents or access build pipelines.

  references:
  - https://buildkite.com/docs/agent/v3/tokens

  examples:
  - 'BUILDKITE_AGENT_TOKEN="a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6a7b8c9d0"'

- name: Buildkite API Token
  id: np.cicd.5

  pattern: |
    (?x)
    \b(bkua_[A-Za-z0-9]{40})\b

  categories: [api, secret]

  description: |
    A Buildkite API access token (prefixed) was detected.

  references:
  - https://buildkite.com/docs/apis/managing-api-tokens

  examples:
  - 'bkua_aBcDeFgHiJkLmNoPqRsTuVwXyZ1234567890ab'

- name: Codecov Token
  id: np.cicd.6

  pattern: |
    (?x)(?i)
    (?:codecov)[_-]?(?:upload)?[_-]?(?:token|key)\s*[:=]\s*['"]?
    ([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})
    ['"]?

  categories: [api, secret]

  description: |
    A Codecov upload token was detected.
    An attacker could upload forged coverage reports or access project data.

  references:
  - https://docs.codecov.com/docs/codecov-uploader

  examples:
  - 'CODECOV_TOKEN="a1b2c3d4-e5f6-7890-abcd-ef1234567890"'

- name: Snyk API Token
  id: np.cicd.7

  pattern: |
    (?x)(?i)
    (?:snyk)[_-]?(?:api)?[_-]?(?:token|key)\s*[:=]\s*['"]?
    ([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})
    ['"]?

  categories: [api, secret]

  description: |
    A Snyk API token was detected.
    An attacker could access vulnerability scan results or modify project settings.

  references:
  - https://docs.snyk.io/snyk-api/rest-api/authentication-for-api

  examples:
  - 'SNYK_TOKEN="a1b2c3d4-e5f6-7890-abcd-ef1234567890"'

- name: Semgrep App Token
  id: np.cicd.8

  pattern: |
    (?x)(?i)
    (?:semgrep)[_-]?(?:app)?[_-]?(?:token|key)\s*[:=]\s*['"]?
    ([A-Za-z0-9]{30,})
    ['"]?

  categories: [api, secret]

  description: |
    A Semgrep App token was detected.

  references:
  - https://semgrep.dev/docs/semgrep-ci/running-semgrep-ci-with-semgrep-cloud-platform/

  examples:
  - 'SEMGREP_APP_TOKEN="aBcDeFgHiJkLmNoPqRsTuVwXyZ123456"'
