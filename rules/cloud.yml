# Detection rules for cloud platform and hosting provider credentials.
# Covers platforms NOT in Noseyparker defaults (which has AWS, Azure, GCP, DigitalOcean, Heroku, Dropbox).

rules:

- name: Cloudflare API Token
  id: np.cloud.1

  pattern: |
    (?x)(?i)
    (?:cloudflare|cf)[_-]?(?:api)?[_-]?(?:token|key)\s*[:=]\s*['"]?
    ([A-Za-z0-9_-]{40})
    ['"]?

  categories: [api, secret]

  description: |
    A Cloudflare API token was detected.
    An attacker could modify DNS records, purge cache, or access zone settings.

  references:
  - https://developers.cloudflare.com/fundamentals/api/get-started/create-token/

  examples:
  - 'CLOUDFLARE_API_TOKEN="YQSn-xWAQiiEh9qM58wZNnyQS7FUdoqGIUAbrh7T"'

- name: Cloudflare Global API Key
  id: np.cloud.2

  pattern: |
    (?x)(?i)
    (?:cloudflare|cf)[_-]?(?:global)?[_-]?(?:api)?[_-]?(?:key)\s*[:=]\s*['"]?
    ([0-9a-f]{37})
    ['"]?

  categories: [api, secret]

  description: |
    A Cloudflare Global API Key was detected.
    This key has full account access including all zones and settings.

  references:
  - https://developers.cloudflare.com/fundamentals/api/get-started/keys/

  examples:
  - 'CF_API_KEY="1234567893feefc5f0q5000bfo0c38d90bbeb"'

- name: Vercel API Token
  id: np.cloud.3

  pattern: |
    (?x)(?i)
    (?:vercel)[_-]?(?:api)?[_-]?(?:token|key)\s*[:=]\s*['"]?
    ([A-Za-z0-9]{24})
    ['"]?

  categories: [api, secret]

  description: |
    A Vercel API token was detected.
    An attacker could deploy, modify, or delete projects.

  references:
  - https://vercel.com/docs/rest-api#authentication

  examples:
  - 'VERCEL_TOKEN="aBcDeFgHiJkLmNoPqRsTuVwX"'

- name: Netlify Access Token
  id: np.cloud.4

  pattern: |
    (?x)(?i)
    (?:netlify)[_-]?(?:auth)?[_-]?(?:token|key)\s*[:=]\s*['"]?
    ([A-Za-z0-9_-]{40,})
    ['"]?

  categories: [api, secret]

  description: |
    A Netlify personal access token was detected.
    An attacker could deploy sites, access build logs, or modify DNS.

  references:
  - https://docs.netlify.com/cli/get-started/#obtain-a-token-in-the-netlify-ui

  examples:
  - 'NETLIFY_AUTH_TOKEN="nfp_abcdefghijklmnopqrstuvwxyz1234567890ab"'

- name: Linode API Token
  id: np.cloud.5

  pattern: |
    (?x)(?i)
    (?:linode)[_-]?(?:api)?[_-]?(?:token|key)\s*[:=]\s*['"]?
    ([0-9a-f]{64})
    ['"]?

  categories: [api, secret]

  description: |
    A Linode (Akamai) API token was detected.
    An attacker could create, modify, or delete cloud instances.

  references:
  - https://techdocs.akamai.com/linode-api/reference/api

  examples:
  - 'LINODE_TOKEN="a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6"'

- name: Vultr API Key
  id: np.cloud.6

  pattern: |
    (?x)(?i)
    (?:vultr)[_-]?(?:api)?[_-]?(?:key|token)\s*[:=]\s*['"]?
    ([A-Z0-9]{36})
    ['"]?

  categories: [api, secret]

  description: |
    A Vultr API key was detected.
    An attacker could manage cloud instances, DNS, and billing.

  references:
  - https://www.vultr.com/api/

  examples:
  - 'VULTR_API_KEY="ABCDEF1234567890ABCDEF1234567890ABCD"'

- name: Render API Key
  id: np.cloud.7

  pattern: |
    (?x)(?i)
    (?:render)[_-]?(?:api)?[_-]?(?:key|token)\s*[:=]\s*['"]?
    (rnd_[A-Za-z0-9]{32,})
    ['"]?

  categories: [api, secret]

  description: |
    A Render API key was detected.
    An attacker could deploy, modify, or delete services.

  references:
  - https://docs.render.com/api

  examples:
  - 'RENDER_API_KEY="rnd_aBcDeFgHiJkLmNoPqRsTuVwXyZ123456"'

- name: Railway API Token
  id: np.cloud.8

  pattern: |
    (?x)(?i)
    (?:railway)[_-]?(?:api)?[_-]?(?:token|key)\s*[:=]\s*['"]?
    ([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})
    ['"]?

  categories: [api, secret]

  description: |
    A Railway API token was detected.
    An attacker could deploy, access environment variables, or delete projects.

  references:
  - https://docs.railway.com/reference/public-api

  examples:
  - 'RAILWAY_TOKEN="a1b2c3d4-e5f6-7890-abcd-ef1234567890"'

- name: Fly.io API Token
  id: np.cloud.9

  pattern: |
    (?x)(?i)
    (?:fly|flyio|fly_io)[_-]?(?:api)?[_-]?(?:token|key)\s*[:=]\s*['"]?
    (fo1_[A-Za-z0-9_-]{39,})
    ['"]?

  categories: [api, secret]

  description: |
    A Fly.io API token was detected.
    An attacker could deploy apps, access secrets, or manage machines.

  references:
  - https://fly.io/docs/flyctl/tokens/

  examples:
  - 'FLY_API_TOKEN="fo1_aBcDeFgHiJkLmNoPqRsTuVwXyZ_1234567890ab"'

- name: Terraform Cloud Token
  id: np.cloud.10

  pattern: |
    (?x)
    (?:credentials\s+"app\.terraform\.io"\s*\{[^}]*token\s*=\s*"([A-Za-z0-9.]{50,})")

  categories: [secret]

  description: |
    A Terraform Cloud API token was detected in a .terraformrc or credentials file.
    An attacker could modify infrastructure state and deployments.

  references:
  - https://developer.hashicorp.com/terraform/cli/config/config-file#credentials

  examples:
  - |
      credentials "app.terraform.io" {
        token = "aBcDeFgHiJkLmNoPqRsTuVwXyZ.atlasv1.1234567890abcdefghij"
      }

- name: Terraform Cloud Team/Org Token
  id: np.cloud.11

  pattern: |
    (?x)(?i)
    (?:terraform|tfc|tfe)[_-]?(?:cloud)?[_-]?(?:token|api[_-]?token)\s*[:=]\s*['"]?
    ([A-Za-z0-9.]{50,})
    ['"]?

  categories: [api, secret]

  description: |
    A Terraform Cloud/Enterprise API token was detected.

  references:
  - https://developer.hashicorp.com/terraform/cloud-docs/users-teams-organizations/api-tokens

  examples:
  - 'TFC_TOKEN="aBcDeFgHiJkLmNoPqRsTuVwXyZ.atlasv1.1234567890abcdefghij"'

- name: Pulumi Access Token
  id: np.cloud.12

  pattern: |
    (?x)(?i)
    (?:pulumi)[_-]?(?:access)?[_-]?(?:token)\s*[:=]\s*['"]?
    (pul-[a-f0-9]{40})
    ['"]?

  categories: [api, secret]

  description: |
    A Pulumi access token was detected.
    An attacker could modify infrastructure stacks and access state.

  references:
  - https://www.pulumi.com/docs/pulumi-cloud/access-management/access-tokens/

  examples:
  - 'PULUMI_ACCESS_TOKEN="pul-a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6a7b8c9d0"'

- name: Hetzner API Token
  id: np.cloud.13

  pattern: |
    (?x)(?i)
    (?:hetzner|hcloud)[_-]?(?:api)?[_-]?(?:token|key)\s*[:=]\s*['"]?
    ([A-Za-z0-9]{64})
    ['"]?

  categories: [api, secret]

  description: |
    A Hetzner Cloud API token was detected.
    An attacker could create, modify, or delete cloud servers and resources.

  references:
  - https://docs.hetzner.cloud/

  examples:
  - 'HCLOUD_TOKEN="aBcDeFgHiJkLmNoPqRsTuVwXyZ1234567890aBcDeFgHiJkLmNoPqRsTuVwXyZ12"'
