# Detection rules for database connection strings and credentials.
# Covers databases NOT in Noseyparker defaults (which has MongoDB, PostgreSQL, ODBC).

rules:

- name: MySQL Connection String
  id: np.db.1

  pattern: |
    (?x)
    mysql://
    ([^\s:@]+:[^\s@]+@[^\s]+)

  categories: [secret]

  description: |
    A MySQL connection URI with embedded credentials was detected.
    An attacker could use it to access or modify the database.

  references:
  - https://dev.mysql.com/doc/connector-j/en/connector-j-reference-jdbc-url-format.html

  examples:
  - 'mysql://root:p4ssw0rd@db.example.com:3306/mydb'
  - 'DATABASE_URL="mysql://admin:secret@localhost/production"'

  negative_examples:
  - 'mysql://localhost/test'

- name: MySQL Credentials (DSN)
  id: np.db.2

  pattern: |
    (?x)(?i)
    (?:mysql|mariadb)[_-]?(?:password|passwd|pass|pwd)\s*[:=]\s*['"]?
    ([^\s'"]{8,})
    ['"]?

  categories: [fuzzy, secret]

  description: |
    A MySQL/MariaDB password was detected in a configuration variable.

  references:
  - https://dev.mysql.com/doc/refman/en/connection-options.html

  examples:
  - 'MYSQL_PASSWORD="Str0ngP@ssw0rd!"'
  - 'mariadb_pass=MyDbPassword123'

  negative_examples:
  - 'MYSQL_PASSWORD=""'
  - 'MYSQL_PASSWORD=$DB_PASS'

- name: Redis Connection URL
  id: np.db.3

  pattern: |
    (?x)
    rediss?://
    ([^\s:@]+:[^\s@]+@[^\s]+)

  categories: [secret]

  description: |
    A Redis connection URL with credentials was detected.
    An attacker could access cached data, session tokens, or use it for lateral movement.

  references:
  - https://redis.io/docs/latest/develop/reference/clients/

  examples:
  - 'redis://default:mypassword@redis.example.com:6379/0'
  - 'REDIS_URL="rediss://user:s3cret@cache.internal:6380"'

  negative_examples:
  - 'redis://localhost:6379'

- name: Redis Password
  id: np.db.4

  pattern: |
    (?x)(?i)
    (?:redis)[_-]?(?:password|passwd|pass|auth)\s*[:=]\s*['"]?
    ([^\s'"]{8,})
    ['"]?

  categories: [fuzzy, secret]

  description: |
    A Redis password/auth token was detected.

  references:
  - https://redis.io/docs/latest/operate/oss_and_stack/management/security/acl/

  examples:
  - 'REDIS_PASSWORD="MyR3disP@ss"'

  negative_examples:
  - 'REDIS_PASSWORD=${REDIS_PASSWORD}'

- name: Elasticsearch Connection URL
  id: np.db.5

  pattern: |
    (?x)
    https?://
    ([^\s:@]+:[^\s@]+@[^\s]*(?:9200|elasticsearch|elastic\.co)[^\s]*)

  categories: [secret]

  description: |
    An Elasticsearch connection URL with embedded credentials was detected.
    An attacker could read, modify, or delete indexed data.

  references:
  - https://www.elastic.co/guide/en/elasticsearch/reference/current/setting-up-authentication.html

  examples:
  - 'https://elastic:changeme@elasticsearch.example.com:9200'
  - 'ES_URL="https://admin:s3cret@search.internal:9200/myindex"'

- name: Elasticsearch API Key
  id: np.db.6

  pattern: |
    (?x)(?i)
    (?:elastic|elasticsearch|es)[_-]?(?:api)?[_-]?(?:key|token)\s*[:=]\s*['"]?
    ([A-Za-z0-9_-]{40,})
    ['"]?

  categories: [api, secret]

  description: |
    An Elasticsearch API key was detected.

  references:
  - https://www.elastic.co/guide/en/elasticsearch/reference/current/security-api-create-api-key.html

  examples:
  - 'ELASTIC_API_KEY="VnVhQ2ZHY0JDZGJrUW0tZTVhT3g6dWkybHAyYXJUUm1LVVU1dmgtemhQQQ=="'

- name: CouchDB Connection URL
  id: np.db.7

  pattern: |
    (?x)
    https?://
    ([^\s:@]+:[^\s@]+@[^\s]*(?:5984|6984|couchdb)[^\s]*)

  categories: [secret]

  description: |
    A CouchDB connection URL with embedded credentials was detected.

  references:
  - https://docs.couchdb.org/en/stable/api/server/authn.html

  examples:
  - 'http://admin:password@couchdb.local:5984/_all_dbs'
  - 'COUCH_URL="https://user:s3cret@my-couchdb.example.com:6984"'

- name: Cassandra Credentials
  id: np.db.8

  pattern: |
    (?x)(?i)
    (?:cassandra|cql)[_-]?(?:password|passwd|pass)\s*[:=]\s*['"]?
    ([^\s'"]{8,})
    ['"]?

  categories: [fuzzy, secret]

  description: |
    Apache Cassandra credentials were detected.

  references:
  - https://cassandra.apache.org/doc/stable/cassandra/operating/security.html

  examples:
  - 'CASSANDRA_PASSWORD="CassP@ssw0rd123"'

  negative_examples:
  - 'CASSANDRA_PASSWORD=${CASS_PASS}'

- name: MSSQL Connection String
  id: np.db.9

  pattern: |
    (?x)(?i)
    (?:Server|Data\ Source)\s*=\s*[^;]+;\s*
    (?:.*?;)*?\s*
    (?:Password|Pwd)\s*=\s*
    ([^;'"]{6,})

  categories: [secret]

  description: |
    A Microsoft SQL Server connection string with password was detected.

  references:
  - https://learn.microsoft.com/en-us/sql/connect/ado-net/connection-string-syntax

  examples:
  - 'Server=myserver;Database=mydb;User Id=sa;Password=Str0ngP@ss!'

- name: ClickHouse Connection URL
  id: np.db.10

  pattern: |
    (?x)
    (?:clickhouse|ch)(?:\+native)?://
    ([^\s:@]+:[^\s@]+@[^\s]+)

  categories: [secret]

  description: |
    A ClickHouse connection URL with credentials was detected.

  references:
  - https://clickhouse.com/docs/en/interfaces/cli

  examples:
  - 'clickhouse://default:mypassword@clickhouse.example.com:9000/mydb'

- name: InfluxDB Token
  id: np.db.11

  pattern: |
    (?x)(?i)
    (?:influx|influxdb)[_-]?(?:token|api[_-]?token)\s*[:=]\s*['"]?
    ([A-Za-z0-9_-]{40,})
    ['"]?

  categories: [api, secret]

  description: |
    An InfluxDB API token was detected.

  references:
  - https://docs.influxdata.com/influxdb/cloud/admin/tokens/

  examples:
  - 'INFLUXDB_TOKEN="xoJk3fRt9Lm7nPqWvYz2bCdEfGhIjKlMnOpQrStUvWxYz"'
